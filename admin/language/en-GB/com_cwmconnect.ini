COM_CWMCONNECT_FIELD_KML_GXALTITUDEMODE_DESC="<b>Description:</b> <br /><p>Can be used instead of the OGC KML standard <altitudeMode> element, and accepts the following values in addition to the standard altitudeMode values:</p> <p><b>relativeToSeaFloor</b> - Interprets the altitude as a value in meters above the sea floor. If the KML feature is above land rather than sea, the altitude will be interpreted as being above the ground.</p> <p><b>clampToSeaFloor</b> - The altitude specification is ignored, and the KML feature will be positioned on the sea floor. If the KML feature is on land rather than at sea, <b>clampToSeaFloor</b> will instead clamp to ground.</p><br /> <p>As with &lt;altitudeMode&gt;, &lt;gx:altitudeMode&gt; affects:</p> <ul><li>the altitude coordinate within the &lt;coordinates&gt; element</li> <li>&lt;minAltitude&gt; and &lt;maxAltitude&gt; within &lt;LatLonAltBox&gt;</li> <li>&lt;altitude&gt; within &lt;Location&gt;, &lt;GroundOverlay&gt;, and AbstractView (&lt;LookAt&gt; and &lt;Camera&gt;).</li></ul> <p>More information about altitude modes is available in the Altitude Modes chapter of the KML Developer's Guide.</p>"
